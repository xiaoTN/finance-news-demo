<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>金融新闻 AI 分析 Demo</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div>
        <h1>金融新闻 AI 分析 Demo</h1>
        <p id="status">正在加载...</p>
      </div>
      <div class="actions">
        <button id="refreshBtn">立即抓取</button>
        <button id="mockTweetsBtn">推特测试</button>
        <button id="reloadBtn">刷新列表</button>
        <button id="clearBtn">清空数据</button>
      </div>
    </header>

    <section class="mock-form-wrap">
      <h2>自定义人物动态模拟</h2>
      <div class="mock-form">
        <label>
          人物
          <select id="mockPersonSelect">
            <option value="Donald Trump">Donald Trump</option>
            <option value="Elon Musk">Elon Musk</option>
            <option value="Jensen Huang">Jensen Huang</option>
            <option value="Jerome Powell">Jerome Powell</option>
          </select>
        </label>
        <label class="mock-text">
          动态内容
          <input id="mockTextInput" type="text" placeholder="例如：考虑提高汽车进口关税以保护美国制造业" maxlength="300" />
        </label>
        <button id="mockSubmitBtn">发布模拟动态</button>
      </div>
    </section>

    <main class="layout">
      <section class="panel">
        <h2>最新事件流</h2>
        <div id="eventList" class="events"></div>
      </section>
    </main>

    <template id="eventTpl">
      <article class="event">
        <div class="event-head">
          <span class="source"></span>
          <span class="impact"></span>
          <span class="confidence"></span>
        </div>
        <h3 class="title"></h3>
        <p class="summary"></p>
        <p class="why"></p>
        <div class="meta"></div>
        <a class="link" target="_blank" rel="noreferrer">查看原文</a>
      </article>
    </template>

    <script src="/app.js"></script>
  </body>
</html>
