<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>金融新闻 AI 分析 Demo</title>
    <link rel="stylesheet" href="/styles.css?v=3" />
  </head>
  <body>
    <header class="topbar">
      <div>
        <h1>金融新闻 AI 分析 Demo</h1>
        <p id="status">正在加载...</p>
      </div>
      <div class="actions">
        <button id="refreshBtn">立即抓取</button>
        <button id="reloadBtn">刷新列表</button>
        <button id="clearBtn">清空数据</button>
      </div>
    </header>

    <main class="layout">
      <section class="panel">
        <h2>最新事件流</h2>
        <div class="sort-bar">
          <label>
            排序：
            <select id="sortSelect">
              <option value="published">按发布时间</option>
              <option value="captured">按抓取时间</option>
            </select>
          </label>
        </div>
        <div id="eventList" class="events"></div>
      </section>
    </main>

    <template id="eventTpl">
      <article class="event">
        <div class="event-head">
          <span class="source"></span>
          <span class="impact"></span>
        </div>
        <h3 class="title"></h3>
        <p class="summary"></p>
        <p class="why"></p>
        <button class="copy-error-btn" type="button" hidden>复制失败详情</button>
        <div class="meta"></div>
        <a class="link" target="_blank" rel="noreferrer">查看原文</a>
      </article>
    </template>

    <script src="/app.js?v=3"></script>
  </body>
</html>
